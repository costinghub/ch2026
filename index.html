    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
      :root {
        --color-primary: #a855f7; /* High-contrast vibrant Purple 500 for high-tech precision dark theme */
        --color-primary-hover: #9333ea;
        --color-primary-rgb: 168, 85, 247;
        --color-secondary-accent: #c084fc; /* High-fidelity light purple */
        --color-background: #090d16; /* Premium dark black canvas */
        --color-surface: #111827;    /* Sleek obsidian card container */
        --color-text-primary: #f8fafc; 
        --color-text-secondary: #cbd5e1; 
        --color-text-muted: #94a3b8;   
        --color-border: #1f2937;     
        --color-text-input: var(--color-primary);
      }
      [data-theme="light"] {
        --color-primary: #7c3aed; /* Professional Royal Purple 600 for accessible light theme */
        --color-primary-hover: #6d28d9;
        --color-primary-rgb: 124, 58, 237;
        --color-secondary-accent: #db2777; /* Playful accent color */
        --color-background: #f8fafc; /* Cold light gray-slate premium background */
        --color-surface: #ffffff;    
        --color-text-primary: #0f172a; /* High-legibility Slate 900 */
        --color-text-secondary: #334155; 
        --color-text-muted: #64748b;   
        --color-border: #e2e8f0; /* Smooth border */
        --color-text-input: #0f172a;
      }
      *, ::before, ::after {
          transition-property: color, background-color, border-color, text-decoration-color, fill, stroke, opacity, box-shadow, transform, filter, -webkit-backdrop-filter;
          transition-property: color, background-color, border-color, text-decoration-color, fill, stroke, opacity, box-shadow, transform, filter, backdrop-filter;
          transition-property: color, background-color, border-color, text-decoration-color, fill, stroke, opacity, box-shadow, transform, filter, backdrop-filter, -webkit-backdrop-filter;
          transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
          transition-duration: 150ms;
      }
      body {
        background-color: var(--color-background);
        color: var(--color-text-primary);
      }
      /* Style dropdown options for dark theme consistency */
      select option {
        background-color: var(--color-surface);
        color: var(--color-text-input);
      }
       /* Style dropdown options for light theme */
      [data-theme="light"] select option {
        background-color: var(--color-surface);
        color: var(--color-text-primary);
      }

      @media print {
        @page {
          size: A4;
          margin: 1.5cm;
        }
        
        /* Force color adjust */
        body {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
          background-color: white !important;
          color: #0f172a !important;
        }

        /* Hide non-essential UI elements */
        .no-print, 
        header, 
        .sidebar-container, 
        .ai-assistant-widget, 
        button:not(.print-include) {
          display: none !important;
        }

        /* Reset Layout for Print */
        .h-screen, .overflow-hidden, .overflow-y-auto {
          height: auto !important;
          overflow: visible !important;
          display: block !important;
        }

        main {
          padding: 0 !important;
          margin: 0 !important;
          display: block !important;
        }

        .max-w-[1400px], .max-w-6xl, .max-w-4xl {
          max-width: 100% !important;
          width: 100% !important;
          margin: 0 !important;
        }

        /* Force Print Colors on Components */
        .bg-surface, .bg-background {
          background-color: white !important;
        }
        
        .Card, .bg-surface {
          box-shadow: none !important;
          border: 1px solid #e2e8f0 !important;
          background-color: white !important;
        }

        .text-text-primary { color: #0f172a !important; }
        .text-text-secondary { color: #334155 !important; }
        .text-text-muted { color: #64748b !important; }
        .text-primary { color: #7c3aed !important; }
        
        /* Results Specific Tuning */
        .results-header {
          border-bottom: 2px solid #7c3aed !important;
          padding-bottom: 1rem !important;
          margin-bottom: 2rem !important;
        }

        /* Ensure Quote Modal is the only thing shown if active */
        #quote-modal-content {
          position: absolute !important;
          left: 0 !important;
          top: 0 !important;
          width: 100% !important;
          height: auto !important;
          border: none !important;
          box-shadow: none !important;
          overflow: visible !important;
        }

        .printable-border { border-color: #e2e8f0 !important; }
        .printable-text-primary { color: #0f172a !important; }
        .printable-text-secondary { color: #334155 !important; }

        /* Break Points */
        .break-inside-avoid { page-break-inside: avoid !important; }
        .page-break-before { page-break-before: always !important; }
      }
      
      /* Animation Keyframes */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translate3d(0, 20px, 0);
        }
        to {
          opacity: 1;
          transform: translate3d(0, 0, 0);
        }
      }
      
      .animate-fade-in-up {
        animation: fadeInUp 0.6s ease-out forwards;
      }
      
      .delay-100 { animation-delay: 100ms; }
      .delay-200 { animation-delay: 200ms; }
      .delay-300 { animation-delay: 300ms; }
    </style>
