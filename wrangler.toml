name = "costinghub-app-2026"
compatibility_date = "2025-01-01"
main = "server.ts"
pages_build_output_dir = "dist"

[vars]
# Add your environment variables here in the Cloudflare Dashboard
# GEMINI_API_KEY = "your-key-here"
# DATABASE_URL = "your-supabase-url"

[assets]
  directory = "dist"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
